name: weardo_outfit_builder
description: "A clothing app for outfit generation"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
    # Firebase – latest versions (web compatible)
  firebase_core: ^3.12.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0

    # Other packages
  provider: ^6.1.1
  image_picker: ^1.0.5
  uuid: ^4.2.1
  go_router: ^13.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true